<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillTree — Dashboard</title>

  <meta http-equiv="Content-Security-Policy"
content="
  default-src 'self';
  connect-src 'self'https://skilltree-backend-fkf6.onrender.com https:;
  img-src 'self' data:;
  style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
  script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
">

  <!-- CSS -->
  <link rel="stylesheet" href="dist/output.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/theme.css" />
  <link rel="stylesheet" href="assets/css/utilities.css" />

  <!-- JS (ORDER MATTERS) -->
  <script src="assets/js/config.js"></script>     
  <script src="assets/js/auth-guard.js"></script> 
</head>


<body class="dashboard-body">

  <!-- HEADER -->
  <header class="dashboard-header flex items-center justify-between px-6">
    <div class="text-xl font-semibold">
      SkillTree
    </div>

    <div class="flex items-center gap-3">
      <input
        id="searchInput"
        class="search-input px-3 py-1 rounded w-56 text-sm"
        placeholder="Search notes..."
      />

      <button
        id="logoutBtn"
        class="text-xs px-3 py-1 rounded bg-red-500 hover:bg-red-600 text-white"
      >
        Logout
      </button>
    </div>
  </header>

  <!-- MAIN -->
  <main class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar overflow-y-auto">
      <div class="panel-header mb-2">Skills</div>

      <ul id="skillsList" class="space-y-2 text-sm">
        <li class="sidebar-item active">Python</li>
        <li class="sidebar-item">DSA</li>
        <li class="sidebar-item">Backend</li>
        <li class="sidebar-item">System Design</li>
      </ul>
    </aside>

    <!-- NOTES LIST -->
    <section class="notes-panel flex flex-col">
      <div class="flex items-center justify-between mb-3">
        <div class="panel-header">Notes</div>

        <button id="addNoteBtn" class="btn-primary">
          + Add Note
        </button>
      </div>

      <div id="notesList" class="flex-1 overflow-y-auto space-y-2">
        <div class="empty-state">No notes yet</div>
      </div>
    </section>

    
  <!-- NOTE CONTENT PANEL -->
<section class="content-panel flex flex-col">
  <button id="backBtn" class="md:hidden mb-2 text-sm opacity-70">
  ← Back
  </button>

  <!-- HEADER -->
  <div class="note-header">
    <div class="flex justify-between items-center mb-2">
      <h2 id="noteTitle" class="text-lg font-semibold">Select a note</h2>

      <div class="flex flex-wrap gap-2 text-xs">
        <button id="editNoteBtn">Edit</button>
        <button id="readModeBtn">Read mode</button>
        <button id="improveNoteBtn">✨ Improve</button>
        <button id="regenSummaryBtn">Summary</button>
        <button id="generateFlashcardsBtn">Flashcards</button>
        <button id="deleteNoteBtn" class="text-red-400">Delete</button>
      </div>
    </div>

    <!-- TAGS -->
    <div class="flex items-center gap-2 text-xs opacity-80 mb-2">
      <span class="opacity-50">Tags:</span>
      <div id="noteTags" class="flex gap-2 flex-wrap"></div>
    </div>
  </div>

  <!-- 🔥 DIVIDER (Header → Content) -->
  <div class="divider"></div>

  <!-- CONTENT AREA -->
  <div class="note-main flex-1 overflow-y-auto">  </div>
    <div id="noteContent" class="note-content note-scroll"></div>
  </div>

  <!-- 🔥 DIVIDER (Content → Summary) -->
  <div class="divider"></div>

  <!-- SUMMARY -->
  <div class="note-summary-section mt-2">
    <div class="text-xs opacity-50 mb-1">Summary</div>

    <div id="noteSummary" class="note-summary"></div>

    <div id="summaryUpdated" class="summary-date mt-1"></div>
  </div>

</section>

  </main>
<!-- CREATE NOTE MODAL -->
<div
  id="createNoteModal"
  class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50"
>
  <div class="glass w-[90%] max-w-md p-4 rounded-lg">

    <h3 class="text-sm font-semibold mb-3">Create Note</h3>

    <input
      id="newNoteTitle"
      class="w-full mb-2 px-2 py-1 text-sm bg-white/10 rounded"
      placeholder="Note title"
    />

    <textarea
      id="newNoteContent"
      class="w-full h-32 px-2 py-1 text-sm bg-white/10 rounded resize-none"
      placeholder="Write your note..."
    ></textarea>

    <!-- OCR BUTTON (clean version) -->
    <div class="mt-2">
      <button
        id="ocrBtn"
        class="text-xs px-3 py-1 rounded bg-blue-500 hover:bg-blue-600 text-white"
      >
        Upload Image
      </button>

      <!-- hidden file input -->
      <input
        type="file"
        id="ocrInput"
        accept="image/*"
        hidden
      />
    </div>

    <input
      id="newNoteTags"
      class="w-full mt-2 px-2 py-1 text-sm bg-white/10 rounded"
      placeholder="Tags (comma separated)"
    />

    <div class="flex justify-end gap-2 mt-3">
      <button id="cancelCreateNote" class="text-xs opacity-60">Cancel</button>
      <button id="saveCreateNote" class="btn-primary">Save</button>
    </div>

  </div>
</div>

  <!-- Scripts -->
  <script src="assets/js/logout.js"></script>
  <script src="assets/js/dashboard/api.js"></script>
  <script src="assets/js/dashboard/notes-list.js"></script>
  <script src="assets/js/dashboard/note-detail.js"></script>
  <script src="assets/js/dashboard/note-editor.js"></script>
  <script src="assets/js/dashboard/note-actions.js"></script>
  <script src="assets/js/dashboard/filters.js"></script>
  <script src="assets/js/dashboard/init.js"></script>

</body>
</html>
